<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态获取JSON文件内容</title>
    <!-- 引入axios -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <button class="btn" onclick="start()">获取JSON数据5</button>
        <p id="result"></p>
    </div>

    <script>
        const sleep = (ms) => {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        const getToday = async (type, num) => {
            const list = []
            for (let i = 0; i <= num; i++) {
                const targetUrl = 'https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page='+ i + '&num=100&sort=symbol&asc=1&node=' + type + '_a';
                const res = await axios.get(targetUrl);
                list.push(...res.data)
                await sleep(1800);
            }
            return list
        }
        const isGoldenNeedleBottom = (currentK) => {
          const { open, trade, high, low } = currentK;
          const o = Number(open);
          const c = Number(trade);
          const h = Number(high);
          const l = Number(low);
          
          // 计算K线实体
          const bodySize = Math.abs(c - o);
          const totalRange = h - l;
          
          // 避免除零
          if (totalRange === 0) return false;
          
          // 下影线长度（最低点到实体较近端）
          const lowerShadow = Math.min(o, c) - l;
          
          // 上影线长度（实体较远端到最高点）
          const upperShadow = h - Math.max(o, c);
          
          // 金针探底特征：
          // 1. 下影线至少是实体的3倍
          // 2. 上影线很短（小于实体的1/2）
          // 3. 下影线至少是上影线的4倍
          // 4. 整体振幅较大（至少2%）
          const flag = lowerShadow >= bodySize * 3 &&
            upperShadow <= bodySize * 0.5 &&
            lowerShadow >= upperShadow * 4 &&
            totalRange >= c * 0.02
          return flag;
        }
        const start = async () => {
            document.getElementById('result').innerText = '计算中，请稍候...';
            const symbolList = []
            const list = []
            const szList = await getToday('sz', 29);
            const shList = await getToday('sh', 18);
            console.log(5555, new Date().getTime())
            const gpList = [...shList, ...szList]
            for (let i = 0; i < gpList.length; i++) {
                const symbol = gpList[i].symbol
                if (symbolList.length && !symbolList.includes(symbol)) {
                    continue
                }
                if (isGoldenNeedleBottom(gpList[i]) && gpList[i].trade * 1 <= 80) {
                    list.push(symbol)
                }
                console.log(4444, i)
            }
            console.log(666, list)
            console.log(666, new Date().getTime())
            document.getElementById('result').innerText = list.join(', ')
            alert('获取完成')
        }
    </script>
</body>
</html>
